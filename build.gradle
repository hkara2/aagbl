plugins {
    id 'java'
    id 'distribution'
}
// apply plugin: 'java'

version = "1.1"


java {
    sourceCompatibility = JavaVersion.VERSION_1_8                        
    targetCompatibility = JavaVersion.VERSION_1_8
    withJavadocJar() //not using this
    withSourcesJar() //not using this
}

repositories {
    mavenCentral()
}

test {
    useJUnitPlatform()
}

dependencies {
    compileOnly group: 'commons-collections', name: 'commons-collections', version: '3.2.2'
    //testCompile group: 'junit', name: 'junit', version: '4.+'
    testImplementation 'org.junit.jupiter:junit-jupiter-api:5.8.1'
    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine:5.8.1'
}

/**
task sourcesJar(type: Jar, dependsOn: classes) {
    archiveClassifier = 'sources'
    from sourceSets.main.allSource + sourceSets.test.allSource 
}

task javadocJar(type: Jar, dependsOn: javadoc) {
    archiveClassifier = 'javadoc'
    from javadoc.destinationDir
}

artifacts {
    archives sourcesJar
    archives javadocJar
}
*/

distributions {
    
    main {
        distributionBaseName = 'aagbl'
        contents {
            from jar
            from javadocJar
            from sourcesJar
            from 'readme.md'
            into('docs') {
                from 'doc'
            }
        }
    }
    
}


